<!DOCTYPE html>
<html>
<head>
  <title>🧠 Mythiq Math Solver</title>
  <script src="/static/main.js" defer></script>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #111; color: #eee; }
    input, button { padding: 0.5rem; font-size: 1rem; }
    #math-output { margin-top: 1rem; font-weight: bold; }
  </style>
</head>
<body>
  <h2>➗ Mythiq AI Math Solver</h2>
  <form id="math-form">
    <input type="text" id="math-question" placeholder="e.g. 2x + 5 = 13" size="40" />
    <button type="submit">Solve</button>
  </form>
  <div id="math-output">Awaiting input...</div>
</body>
</html>
