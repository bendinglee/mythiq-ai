<!DOCTYPE html>
<html>
<head><title>Mythiq Interface</title></head>
<body>
  <h1>🧠 Interface Control</h1>
  <label>Preset</label>
  <select id="preset">
    <option value="default">Default</option>
    <option value="beginner_mode">Beginner</option>
    <option value="formal_expert">Expert</option>
  </select><br/>
  <label>Tone</label>
  <select id="tone"><option value="friendly">Friendly</option><option value="serious">Serious</option></select><br/>
  <label>Plugins (comma)</label>
  <input id="plugins" /><br/>
  <button onclick="submit()">Save</button>
  <pre id="output"></pre>
  <script src="intent_ui.js"></script>
</body>
</html>
